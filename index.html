<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Dados</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
      padding:20px;
    }

    .container{
      max-width:700px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .card{
      background:#1f2937;
      padding:20px;
      border-radius:18px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
    }

    .title{
      font-size:24px;
      margin-bottom:15px;
      text-align:center;
    }

    .label{
      margin-top:10px;
      margin-bottom:8px;
      display:block;
      font-size:16px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#374151;
      color:white;
      font-size:18px;
      margin-bottom:10px;
      text-align:center;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#2563eb;
    }

    .dice-inputs{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:15px;
    }

    .dice-inputs input{
      width:70px;
      margin:0;
    }

    .result{
      margin-top:20px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .dice-image{
      width:100px;
      height:100px;
      object-fit:contain;
      background:#111827;
      padding:10px;
      border-radius:12px;
    }

    .error{
      color:#ef4444;
      text-align:center;
      margin-top:10px;
    }

    @media(max-width:480px){

      .dice-image{
        width:75px;
        height:75px;
      }

      .dice-inputs input{
        width:60px;
      }

    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Conversor de Dados</h1>

    <!-- D6 -->
    <div class="card">

      <div class="title">D6</div>

      <label class="label">Quantidade de D6:</label>
      <input type="number" id="d6Count" min="1" max="20" placeholder="Ex: 3">

      <button onclick="createInputs('d6', 6)">
        Criar Campos
      </button>

      <div class="dice-inputs" id="d6Inputs"></div>

      <button style="margin-top:15px;" onclick="convertDice('d6', 6)">
        Converter
      </button>

      <div class="result" id="d6Result"></div>

    </div>

    <!-- D10 -->
    <div class="card">

      <div class="title">D10</div>

      <label class="label">Quantidade de D10:</label>
      <input type="number" id="d10Count" min="1" max="20" placeholder="Ex: 4">

      <button onclick="createInputs('d10', 10)">
        Criar Campos
      </button>

      <div class="dice-inputs" id="d10Inputs"></div>

      <button style="margin-top:15px;" onclick="convertDice('d10', 10)">
        Converter
      </button>

      <div class="result" id="d10Result"></div>

    </div>

    <!-- D12 -->
    <div class="card">

      <div class="title">D12</div>

      <label class="label">Quantidade de D12:</label>
      <input type="number" id="d12Count" min="1" max="20" placeholder="Ex: 2">

      <button onclick="createInputs('d12', 12)">
        Criar Campos
      </button>

      <div class="dice-inputs" id="d12Inputs"></div>

      <button style="margin-top:15px;" onclick="convertDice('d12', 12)">
        Converter
      </button>

      <div class="result" id="d12Result"></div>

    </div>

  </div>

  <script>

    // cria os campos de valores
    function createInputs(type, maxValue){

      const count = Number(document.getElementById(type + 'Count').value);
      const container = document.getElementById(type + 'Inputs');

      container.innerHTML = "";

      if(count < 1 || isNaN(count)){
        return;
      }

      for(let i = 0; i < count; i++){

        container.innerHTML += `
          <input 
            type="number"
            min="1"
            max="${maxValue}"
            placeholder="${i + 1}"
            class="${type}-value"
          >
        `;
      }
    }

    // converte os valores em imagens
    function convertDice(type, maxValue){

      const result = document.getElementById(type + 'Result');

      const inputs = document.querySelectorAll(`.${type}-value`);

      result.innerHTML = "";

      let hasError = false;

      inputs.forEach(input => {

        const value = Number(input.value);

        if(value < 1 || value > maxValue || isNaN(value)){

          hasError = true;

          return;
        }

        const imagePath = `images/${type}_${value}.png`;

        result.innerHTML += `
          <img
            src="${imagePath}"
            class="dice-image"
            alt="${type}_${value}"
          >
        `;

      });

      if(hasError){

        result.innerHTML = `
          <div class="error">
            Um ou mais valores estão inválidos.
          </div>
        `;

      }

    }

  </script>

</body>
</html>
